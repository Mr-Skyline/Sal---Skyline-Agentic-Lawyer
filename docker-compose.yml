version: "3.9"

services:
  sal:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./credentials.json:/app/credentials.json:ro
      - ./token.pickle:/app/token.pickle:ro
      - ./skyline_review:/app/skyline_review
    restart: unless-stopped

  sync-worker:
    build: .
    entrypoint: ["python", "-m", "src.sal.sync_worker"]
    env_file:
      - .env
    volumes:
      - ./credentials.json:/app/credentials.json:ro
      - ./token.pickle:/app/token.pickle:ro
      - ./correspondence_archive:/app/correspondence_archive
    restart: unless-stopped
